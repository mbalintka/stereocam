version: '3.8'

services:
  szocske_dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/ros2_ws # A gyökérkönyvtár csatolása
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
    network_mode: "host"
    privileged: true
    command: /bin/bash
    tty: true
    stdin_open: true